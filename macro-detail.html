.nav-links a:hover{color:var(--text);}

.tl-entry{position:relative;padding:12px 0 20px;border-bottom:1px solid rgba(184,155,94,0.05);}
.tl-entry:last-child{border-bottom:none;}
.tl-dot{position:absolute;left:-24px;top:16px;width:10px;height:10px;border-radius:50%;border:2px solid var(--gold);background:var(--bg);}

.tl-date{font-family:'DM Mono',monospace;font-size:10px;color:var(--gold);letter-spacing:0.1em;margin-bottom:4px;}

// ── SPARKLINE ──
function makeSpark(data, color, w=200, h=40) {
  const min = Math.min(...data), max = Math.max(...data);
  const range = max - min || 1;
  const pts = data.map((v,i) => `${i*(w/(data.length-1))},${h-(((v-min)/range)*(h-4))-2}`).join(' ');
  const area = pts + ` ${w},${h} 0,${h}`;
  return `<svg viewBox="0 0 ${w} ${h}" width="${w}" height="${h}">
    <polygon points="${area}" fill="${color}" opacity="0.12"/>
    <polyline points="${pts}" stroke="${color}" stroke-width="2" fill="none"/>
  </svg>`;
}

// ── RENDER ──

    document.getElementById('timeline').innerHTML = '';
    document.getElementById('contentArea').innerHTML = '<div class="empty-state"><div class="empty-icon">?</div>Section inconnue.</div>';
    return;

  document.getElementById('breadcrumbName').textContent = section.name;
  document.getElementById('pageTitle').innerHTML = `${section.icon} ${section.name}`;
  document.getElementById('pageSub').textContent = section.description;

    <div class="current-main">
      <div class="current-label">Valeur actuelle</div>
      <div class="current-val">${section.currentVal}</div>
      ${section.currentChange ? `<div class="current-change" style="color:${section.changeColor}">${section.currentChange}</div>` : ''}
    </div>
    <div class="current-sep"></div>
    <div class="current-meta">
      <div><strong>Période :</strong> ${section.unit}</div>
      <div><strong>Signal :</strong> ${section.signal.charAt(0).toUpperCase() + section.signal.slice(1)}</div>
      <div><strong>Source :</strong> ${section.source}</div>
    </div>
    <div class="current-spark">${makeSpark(section.spark, section.color)}</div>
  `;

  // Timeline
  const tl = document.getElementById('timeline');
  if (section.history.length === 0) {
    tl.innerHTML = '<div class="empty-state"><div class="empty-icon">-</div>Aucun historique disponible.</div>';
  } else {
    tl.innerHTML = section.history.map(h => `
      <div class="tl-entry">
        <div class="tl-dot"></div>
        <div class="tl-date">${h.date}</div>
        <div class="tl-val">${h.val}</div>
        <div class="tl-note">${h.note}</div>
        <div class="tl-source">Source : ${h.source}</div>
      </div>
    `).join('');
  }

  // Content / Articles
  const ca = document.getElementById('contentArea');
  if (section.articles.length === 0) {
    ca.innerHTML = `<div class="empty-state"><div class="empty-icon">-</div>Aucune note pour le moment. Les analyses seront ajoutées ici au fil des publications.</div>`;
  } else {
    ca.innerHTML = section.articles.map(a => `
      <div class="content-card">
        <div class="cc-date">${a.date}</div>
        <div class="cc-title">${a.title}</div>
        <div class="cc-body">${a.body}</div>
      </div>
    `).join('');
  }
}

render();
</script>
