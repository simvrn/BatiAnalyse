<script>
const WP_API = 'https://wp-adminclaudecanouche.batianalyste.fr/wp-json/wp/v2'

// ── Lecture de l'ID dans l'URL (?id=123) ──
const params = new URLSearchParams(location.search)
const postId = parseInt(params.get('id'))

if (!postId) {
  showNotFound('Aucun article spécifié.')
} else {
  loadArticle(postId)
}

// ── Afficher les squelettes de chargement ──
function showSkeletons() {
  document.getElementById('articleHeader').innerHTML = `
    <div class="sk-cat"></div>
    <div class="sk-h1"></div>
    <div class="sk-h1 sk-short"></div>
    <div class="sk-meta"></div>`
  document.getElementById('articleContent').innerHTML = Array.from({length:6}).map((_,i) =>
    `<div class="sk-p${i===2||i===5?' sk-short':''}"></div>`
  ).join('')
}

// ─────────────────────────────────────────────────────────────
//  MAILLAGE INTERNE AUTOMATIQUE
//  Injecte des liens vers les pages du site sur les mots-clés
//  reconnus. Max 1-2 liens par URL et par article. Ne touche pas
//  aux titres (h1-h6), liens existants, code, ni aux citations.
// ─────────────────────────────────────────────────────────────
const INTERNAL_MAP = [
  // Fiches entreprises (/entreprise?id=...)
  { re: /\bVinci\b/,               url: '/entreprise?id=vinci',        max: 1 },
  { re: /\bEiffage\b/,             url: '/entreprise?id=eiffage',      max: 1 },
  { re: /\bBouygues\b/,            url: '/entreprise?id=bouygues',     max: 1 },
  { re: /\bSaint-Gobain\b/i,       url: '/entreprise?id=saint-gobain', max: 1 },
  { re: /\bSPIE\b/,                url: '/valeurs-cotees',             max: 1 },
  // Réglementation
  { re: /\bF-Gas\s?III\b/i,        url: '/reglementation',             max: 2 },
  { re: /\bF-Gas\b/i,              url: '/reglementation',             max: 1 },
  { re: /\bRE\s?2020\b/i,          url: '/reglementation',             max: 1 },
  { re: /\bLoi Climat(?:\s&\sRésilience)?\b/i, url: '/reglementation', max: 1 },
  // M&A
  { re: /\bLBO\b/,                 url: '/lbo',                        max: 2 },
  { re: /\bIPO\b/,                 url: '/ma-ipo',                     max: 1 },
  { re: /\bjoint[- ]ventures?\b/i, url: '/ma-joint-ventures',          max: 1 },
  { re: /\bbuild[- ]ups?\b/i,      url: '/ma-build-up',                max: 1 },
  { re: /\bM&A\b/,                 url: '/ma-hub',                     max: 1 },
  { re: /\bPrivate Equity\b/i,     url: '/pe',                         max: 1 },
  { re: /\bcapital[- ]investissement\b/i, url: '/pe',                  max: 1 },
  // Macro
  { re: /\bmatières premières\b/i, url: '/macro',                      max: 1 },
  // Contech
  { re: /\bcontech\b/i,            url: '/contech',                    max: 1 },
  { re: /\bBIM\b/,                 url: '/contech',                    max: 1 },
  // Deal SPIE/Euroconfort
  { re: /\bEuroconfort\b/,         url: '/spie-euroconfort',           max: 1 },
]

const _SKIP = new Set(['A','H1','H2','H3','H4','H5','H6','SCRIPT','STYLE','CODE','PRE','FIGURE','FIGCAPTION'])

function addInternalLinks(html) {
  const div = document.createElement('div')
  div.innerHTML = html
  const counts = {}
  INTERNAL_MAP.forEach(({ url }) => { if (!(url in counts)) counts[url] = 0 })

  // Collecte des nœuds texte éligibles (hors balises protégées)
  const walker = document.createTreeWalker(div, NodeFilter.SHOW_TEXT, {
    acceptNode(node) {
      let el = node.parentElement
      while (el && el !== div) {
        if (_SKIP.has(el.tagName)) return NodeFilter.FILTER_REJECT
        el = el.parentElement
      }
      return node.textContent.trim() ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_REJECT
    }
  })
  const nodes = []
  let n
  while ((n = walker.nextNode())) nodes.push(n)

  for (const textNode of nodes) {
    for (const { re, url, max } of INTERNAL_MAP) {
      if ((counts[url] || 0) >= max) continue
      const text = textNode.textContent
      const match = re.exec(text)
      if (!match) continue

      counts[url]++
      const parent = textNode.parentNode
      const a = document.createElement('a')
      a.href = url
      a.textContent = match[0]
      a.dataset.internal = '1'

      parent.insertBefore(document.createTextNode(text.slice(0, match.index)), textNode)
      parent.insertBefore(a, textNode)
      parent.insertBefore(document.createTextNode(text.slice(match.index + match[0].length)), textNode)
      parent.removeChild(textNode)
      break // un seul remplacement par nœud texte pour ne pas sur-optimiser
    }
  }
  return div.innerHTML
}

// ── Chargement et rendu de l'article ──
async function loadArticle(id) {
  showSkeletons()
  try {
    const res = await fetch(`${WP_API}/posts/${id}?_embed`)
    if (res.status === 404) { showNotFound('Article introuvable.'); return }
    if (!res.ok) throw new Error('HTTP ' + res.status)
    const post = await res.json()
    renderArticle(post)
  } catch(e) {
    showNotFound('Impossible de charger cet article.')
  }
}

function renderArticle(post) {
  const title    = post.title?.rendered   || 'Sans titre'
  const content  = post.content?.rendered || ''
  const date     = post.date
    ? new Date(post.date).toLocaleDateString('fr-FR', { day:'numeric', month:'long', year:'numeric' })
    : ''
  const cat      = post._embedded?.['wp:term']?.[0]?.[0]?.name || 'Analyse'
  const catId    = post._embedded?.['wp:term']?.[0]?.[0]?.id   || null
  const img      = post._embedded?.['wp:featuredmedia']?.[0]?.source_url || null
  const rawAuthor  = post._embedded?.author?.[0]?.name || ''
  // Masquer l'email si le nom d'auteur WordPress contient un @ (ex: sim.vrny@gmail.com)
  const authorName = (rawAuthor && !rawAuthor.includes('@')) ? rawAuthor : 'BatiAnalyse'

  // Estimation du temps de lecture
  const wordCount = content.replace(/<[^>]+>/g,' ').split(/\s+/).filter(Boolean).length
  const readTime  = Math.max(1, Math.round(wordCount / 200))

  // Mise à jour du <title> de la page
  document.title = `${title} — BatiAnalyse`

  // Breadcrumb
  document.getElementById('breadcrumbTitle').textContent = title

  // Header
  document.getElementById('articleHeader').innerHTML = `
    <div class="art-cat">${cat}</div>
    <h1 class="art-title">${title}</h1>
    <div class="art-meta">
      <span class="art-author">${authorName}</span>
      <span class="art-sep">·</span>
      <span>${date}</span>
      <span class="art-sep">·</span>
      <span>${readTime} min de lecture</span>
    </div>`

  // Image à la une
  if (img) {
    const wrap = document.getElementById('featuredImageWrap')
    wrap.style.display = 'block'
    wrap.innerHTML = `<img class="featured-img" src="${img}" alt="${title}">`
  }

  // Contenu HTML WordPress (nettoyé des liens internes WP)
  const sanitized = content.replace(
    /href="https:\/\/batianalyste\.fr\/(?!wp-content)[^"]*"/g,
    'href="#" onclick="return false"'
  )
  document.getElementById('articleContent').innerHTML = addInternalLinks(sanitized)

  // Articles liés (même catégorie, hors article courant)
  if (catId) loadRelated(catId, post.id)
}

// ── Articles liés ──
async function loadRelated(catId, excludeId) {
  try {
    const res   = await fetch(`${WP_API}/posts?categories=${catId}&exclude=${excludeId}&per_page=3&_embed&orderby=date&order=desc`)
    const posts = await res.json()
    if (!Array.isArray(posts) || posts.length === 0) return

    const section = document.getElementById('relatedSection')
    const grid    = document.getElementById('relatedGrid')
    section.style.display = 'block'

    grid.innerHTML = posts.map(p => {
      const pImg   = p._embedded?.['wp:featuredmedia']?.[0]?.source_url || null
      const pCat   = p._embedded?.['wp:term']?.[0]?.[0]?.name || 'Analyse'
      const pDate  = p.date ? new Date(p.date).toLocaleDateString('fr-FR', { day:'numeric', month:'short', year:'numeric' }) : ''
      const pTitle = p.title?.rendered || 'Sans titre'
      return `<div class="related-card" onclick="location.href='/article.html?id=${p.id}'">
        <div class="related-img ${pImg ? '' : 'related-img-ph'}" style="${pImg ? `background-image:url('${pImg}')` : ''}"></div>
        <div class="related-cat">${pCat}</div>
        <div class="related-title">${pTitle}</div>
        <div class="related-date">${pDate}</div>
      </div>`
    }).join('')
  } catch(e) { /* articles liés non critiques */ }
}

// ── Page 404 interne ──
function showNotFound(msg) {
  document.getElementById('articleHeader').innerHTML = ''
  document.getElementById('articleContent').innerHTML = `
    <div class="not-found">
      <div class="nf-icon">◎</div>
      <div class="nf-title">Article non trouvé</div>
      <div class="nf-sub">${msg}</div>
      <a href="/blog.html" class="nf-back">← Retour aux analyses</a>
    </div>`
}
